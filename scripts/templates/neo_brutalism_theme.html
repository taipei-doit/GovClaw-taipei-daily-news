<!DOCTYPE html>
<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
      @font-face {
          font-family: 'Dela Local';
          src: url('DelaGothicOne-Regular.ttf');
      }
      body { background: #facc15; color: #171717; margin: 0; font-family: 'Noto Sans TC'; height: 1080px; width: 1920px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
      .card { background: #ffffff; border: 12px solid #171717; padding: 70px; width: 1700px; height: 900px; display: flex; gap: 80px; box-shadow: 30px 30px 0px #171717; box-sizing: border-box; }
      .full-card { background: #ffffff; border: 12px solid #171717; padding: 100px; width: 1700px; height: 900px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; box-shadow: 30px 30px 0px #171717; box-sizing: border-box; }
      
      /* Intro Slide Specifics */
      .intro .badge { background: #171717; color: #facc15; display: inline-block; padding: 15px 40px; font-size: 36px; font-weight: 900; margin-bottom: 50px; letter-spacing: 2px; text-transform: uppercase; border: 6px solid #171717; box-shadow: 15px 15px 0px #facc15, 15px 15px 0px 6px #171717; }
      .intro h1 { font-family: 'Dela Local', 'Dela Gothic One', cursive; font-size: 220px; font-weight: normal; margin: 0; color: #171717; line-height: 1.1; }
      .intro h2 { font-size: 80px; font-weight: 900; margin: 20px 0 0 0; color: #171717; }

      /* Content Slide Specifics */
      .content .text-side { flex: 1.2; display: flex; flex-direction: column; justify-content: center; }
      .content .img-side { flex: 1; border: 10px solid #171717; box-shadow: 20px 20px 0px #171717; overflow: hidden; background: #e5e5e5; display: flex; align-items: center; justify-content: center; }
      .content img { width: 100%; height: 100%; object-fit: cover; filter: contrast(1.1); }
      .content h1 { font-family: 'Noto Sans TC', sans-serif; font-size: 55px; font-weight: 900; line-height: 1.3; margin: 0 0 30px 0; border-bottom: 8px solid #171717; padding-bottom: 20px; }
      .content .label { font-size: 28px; font-weight: 900; background: #facc15; border: 4px solid #171717; padding: 5px 15px; display: inline-block; margin-bottom: 15px; letter-spacing: 2px; }
      .content p.reason { font-size: 32px; font-weight: 700; margin: 0 0 30px 0; color: #404040; line-height: 1.5; }
      .content p.script-text { font-size: 38px; line-height: 1.6; font-weight: 700; margin: 0; }

      /* Outro Slide Specifics */
      .outro h1 { font-family: 'Noto Sans TC', sans-serif; font-size: 140px; font-weight: 900; margin: 0 0 40px 0; color: #171717; line-height: 1.1; }
      .outro h2 { font-family: 'Noto Sans TC', sans-serif; font-size: 70px; font-weight: 900; margin: 0; color: #171717; background: #facc15; border: 8px solid #171717; padding: 20px 50px; box-shadow: 15px 15px 0px #171717; display: inline-block; }
    </style>
</head>
<body>
  <!-- Reference structure only -->
</body>
</html>
